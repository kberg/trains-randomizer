<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Red rounded background -->
  <rect width="32" height="32" rx="4" fill="#C0392B"/>

  <!-- Cab (back/left) -->
  <rect x="2" y="9" width="8" height="14" rx="1" fill="white"/>
  <!-- Cab window -->
  <rect x="3.5" y="11" width="4" height="4.5" rx="0.5" fill="#C0392B"/>

  <!-- Boiler/body -->
  <rect x="8" y="13" width="18" height="9" rx="2.5" fill="white"/>

  <!-- Smokestack (toward front) -->
  <rect x="20" y="7" width="3" height="7" fill="white"/>
  <!-- Stack top flare -->
  <rect x="19" y="7" width="5" height="2" rx="0.5" fill="white"/>

  <!-- Dome (middle of boiler) -->
  <ellipse cx="14" cy="13" rx="2.5" ry="2" fill="white"/>

  <!-- Large drive wheels -->
  <circle cx="11" cy="24" r="4" fill="#C0392B" stroke="white" stroke-width="1.5"/>
  <circle cx="20" cy="24" r="4" fill="#C0392B" stroke="white" stroke-width="1.5"/>

  <!-- Small pilot wheel (front/right) -->
  <circle cx="28" cy="25" r="2.2" fill="#C0392B" stroke="white" stroke-width="1.2"/>

  <!-- Small trailing wheel (back/left) -->
  <circle cx="4" cy="25" r="2.2" fill="#C0392B" stroke="white" stroke-width="1.2"/>

  <!-- Cowcatcher (angled bars at front) -->
  <line x1="26" y1="22" x2="31" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="24" x2="30" y2="26.5" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Running board / connecting rod suggestion -->
  <line x1="8" y1="22" x2="25" y2="22" stroke="#C0392B" stroke-width="1"/>
</svg>
